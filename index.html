<!doctype html><html lang="es"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catálogo · Expocerámica y Más</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F4F1;--paper:#fff;--ink:#1A1A18;--ink-soft:#706C64;--line:#E7E5E0;--line-strong:#D6D3CC;--grey-soft:#EDEBE6;--rust:#B23A2E;--shadow:0 1px 2px rgba(26,26,24,.05),0 8px 24px rgba(26,26,24,.06)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:1180px;margin:0 auto;padding:0 18px 70px}
header{padding:32px 0 20px;border-bottom:1px solid var(--line-strong);text-align:center}
header img{height:104px;width:auto;margin:0 auto;display:block}header .tag{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-top:14px}
.sectitle{font-family:"Cormorant Garamond",serif;font-size:23px;font-weight:600;color:var(--ink);margin:26px 0 12px;text-align:center}
.stores{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:0}
.store{display:flex;align-items:center;justify-content:flex-start;gap:8px;padding:16px 18px;border:1px solid var(--line-strong);border-radius:12px;background:var(--paper);color:var(--ink);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.store:hover{border-color:var(--ink);transform:translateY(-1px)}.store svg{flex:none;color:var(--ink-soft)}.store:hover svg{color:var(--ink)}
.ov{position:fixed;inset:0;background:var(--bg);z-index:60;display:none;overflow:auto;padding:24px 18px 60px}.ov.open{display:block}
.ov-wrap{max-width:620px;margin:0 auto}
.ov-back{border:0;background:transparent;color:var(--ink-soft);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;padding:6px 0;display:inline-flex;align-items:center;gap:6px}.ov-back:hover{color:var(--ink)}
.sv-logo{height:88px;display:block;margin:10px auto 0}
.sv-sub{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-top:12px;text-align:center}
.sv-city{font-family:"Cormorant Garamond",serif;font-size:36px;font-weight:700;text-align:center;margin:18px 0 4px}
.sv-name{text-align:center;color:var(--ink-soft);font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;margin-bottom:22px}
.sv-card{background:var(--paper);border:1px solid var(--line);border-radius:15px;padding:20px;box-shadow:var(--shadow)}
.sv-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 2px}
.sv-lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}.sv-val{font-size:16px;font-weight:600}
.sv-call{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--ink);color:#fff;text-decoration:none;border-radius:11px;padding:12px 15px;font-size:14.5px;font-weight:600;margin-top:8px}
.sv-soon{margin-top:16px;padding:15px;border:1px dashed var(--line-strong);border-radius:11px;color:var(--ink-soft);font-size:13px;text-align:center;line-height:1.5}
.sv-block{padding:15px 2px;border-top:1px solid var(--line)}.sv-block:first-child{border-top:0;padding-top:4px}
.sv-blbl{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:9px}
.sv-addr{font-size:15px;line-height:1.55;color:var(--ink)}
.sv-map{display:inline-flex;align-items:center;gap:7px;margin-top:12px;border:1px solid var(--line-strong);border-radius:10px;padding:9px 14px;font-size:13.5px;font-weight:600;text-decoration:none;color:var(--ink)}.sv-map:hover{border-color:var(--ink)}
.sv-seller{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:7px 0}
.sv-num{font-size:15.5px;font-weight:600}
.sv-acts{display:flex;gap:8px}
.sv-mini{display:inline-flex;align-items:center;gap:6px;border-radius:9px;padding:8px 13px;font-size:13px;font-weight:600;text-decoration:none}
.sv-mini.call{background:var(--ink);color:#fff}.sv-mini.wa{background:#25D366;color:#fff}
.sv-photo{width:100%;border-radius:13px;overflow:hidden;margin-bottom:4px;border:1px solid var(--line)}.sv-photo img{width:100%;height:auto;display:block}
.sv-hours div{display:flex;justify-content:space-between;gap:12px;padding:5px 0;font-size:14.5px}.sv-hours div span:first-child{color:var(--ink-soft)}.sv-hours div span:last-child{font-weight:600}
.pv-main{width:100%;height:min(46vh,400px);border-radius:15px;overflow:hidden;background:var(--grey-soft);border:1px solid var(--line);margin-top:6px;position:relative}
.pv-main img{width:100%;height:100%;object-fit:cover;display:block}
.pv-main .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(45deg,#ecebe6 0 16px,#e3e1da 16px 32px)}.pv-main .ph span{font-family:"Cormorant Garamond",serif;font-size:64px;color:#a8a59c}
.pv-liq{position:absolute;top:12px;left:12px;font-size:11px;font-weight:700;letter-spacing:.06em;padding:6px 12px;border-radius:999px;text-transform:uppercase;background:var(--rust);color:#fff}
.pv-thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.pv-thumb{width:60px;height:60px;border-radius:9px;overflow:hidden;border:2px solid transparent;cursor:pointer;background:var(--grey-soft)}
.pv-thumb.on{border-color:var(--ink)}.pv-thumb img{width:100%;height:100%;object-fit:cover}
.pv-title{font-family:"Cormorant Garamond",serif;font-size:30px;font-weight:700;margin:18px 0 10px}
.pv-meta{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.pv-tag{font-size:12.5px;color:var(--ink-soft);background:var(--paper);border:1px solid var(--line-strong);border-radius:7px;padding:5px 10px;font-weight:500}.pv-tag.sz{color:var(--ink);font-weight:600}
.pv-price{font-size:18px;font-weight:700;margin-bottom:18px}
.plabel{color:var(--ink-soft);font-weight:600}
.pv-sec{font-family:"Cormorant Garamond",serif;font-size:19px;font-weight:600;margin:18px 0 10px}
.areas{display:grid;grid-template-columns:1fr 1fr;gap:11px 18px}
.area{display:flex;align-items:center;gap:9px;font-size:14.5px}.area .dot{width:13px;height:13px;border-radius:50%;background:var(--rust);flex:none}
.bar{background:var(--bg);padding:6px 0 12px;border-bottom:1px solid var(--line);margin-bottom:18px}
.sticktop{position:sticky;top:0;z-index:10;background:var(--bg);padding:8px 0}.sb{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line-strong);border-radius:13px;padding:12px 15px;box-shadow:var(--shadow)}
.sb input{border:0;outline:0;font-size:16px;width:100%;background:transparent;color:var(--ink);font-family:inherit}
.fl{display:flex;flex-direction:column;align-items:flex-start;gap:2px;margin-top:12px}
.fgroup{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-top:11px}
.fglabel{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;min-width:128px;padding-top:7px;flex-shrink:0}
.fgchips{display:flex;gap:8px;flex-wrap:wrap}
@media(max-width:560px){.fglabel{min-width:100%;padding-top:0;margin-bottom:-4px}}
.chip{border:1px solid var(--line-strong);background:var(--paper);color:var(--ink-soft);border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}.chip.liq.on{background:var(--rust);border-color:var(--rust)}
.cnt{font-size:12.5px;color:var(--ink-soft);margin-top:10px}
.sortrow{display:flex;align-items:center;gap:10px;margin:0 0 16px;flex-wrap:wrap}.sortrow label{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}.sortsel{border:1px solid var(--line-strong);background:var(--paper);color:var(--ink);border-radius:9px;padding:8px 12px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:18px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:15px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;cursor:pointer;transition:.15s}
.card:hover{transform:translateY(-2px);box-shadow:0 2px 4px rgba(26,26,24,.06),0 14px 34px rgba(26,26,24,.1)}
.thumb{aspect-ratio:1;position:relative;overflow:hidden;background:var(--grey-soft)}.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(45deg,#ecebe6 0 14px,#e3e1da 14px 28px)}.ph span{font-family:"Cormorant Garamond",serif;font-size:34px;color:#a8a59c}
.liqflag{position:absolute;top:9px;left:9px;font-size:10px;font-weight:700;letter-spacing:.06em;padding:5px 10px;border-radius:999px;text-transform:uppercase;background:var(--rust);color:#fff;box-shadow:0 2px 8px rgba(178,58,46,.4)}
.multi{position:absolute;bottom:9px;right:9px;font-size:10px;font-weight:600;padding:4px 8px;border-radius:999px;background:rgba(26,26,24,.7);color:#fff;display:flex;align-items:center;gap:4px}
.cb{padding:13px 14px 15px;display:flex;flex-direction:column;gap:7px;flex:1}.nm{font-weight:600;font-size:14.5px;line-height:1.25}
.meta{display:flex;flex-wrap:wrap;gap:6px}.tag2{font-size:11px;color:var(--ink-soft);background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:3px 7px;font-weight:500}.tag2.sz{color:var(--ink);font-weight:600;border-color:var(--line-strong)}
.pr{font-size:13px;font-weight:600;color:var(--ink);margin-top:auto}
.empty{text-align:center;padding:60px;color:var(--ink-soft)}
footer{text-align:center;margin-top:40px;padding-top:22px;border-top:1px solid var(--line);color:var(--ink-soft);font-size:12px}
@media(max-width:640px){.stores{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.grid{grid-template-columns:repeat(2,1fr);gap:10px}header img{height:72px}}
.thumb img.lz{opacity:0;transition:opacity .4s ease}.thumb img.lz.lz-on{opacity:1}
.pv-main img{cursor:zoom-in}
.pv-zoom{position:fixed;inset:0;background:rgba(10,9,7,.95);z-index:90;display:none}
.pv-zoom.open{display:block}
.pvz-close{position:absolute;top:14px;right:14px;width:42px;height:42px;border:0;border-radius:999px;background:rgba(255,255,255,.14);color:#fff;font-size:26px;line-height:1;cursor:pointer;z-index:2}
.pvz-scroll{width:100%;height:100%;overflow:auto;display:flex;align-items:center;justify-content:center}
.pvz-scroll img{max-width:100%;max-height:100%;object-fit:contain;cursor:zoom-in;display:block;user-select:none}
.pvz-scroll.zoomed{align-items:flex-start;justify-content:flex-start}
.pvz-scroll.zoomed img{max-width:none;max-height:none;width:240%;height:auto;cursor:zoom-out}
.pvz-hint{position:absolute;bottom:16px;left:0;right:0;text-align:center;color:rgba(255,255,255,.65);font-size:12.5px;pointer-events:none}
.pv-wabtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:14px;padding:13px;border:0;border-radius:12px;background:#25D366;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.linkbtn2{display:block;width:100%;text-align:center;margin-top:10px;border:0;background:transparent;color:var(--ink-soft);font-size:13px;text-decoration:underline;cursor:pointer;font-family:inherit}
.wp-ov{position:fixed;inset:0;background:rgba(34,31,26,.45);z-index:70;display:none;align-items:flex-start;justify-content:center;padding:40px 18px;overflow:auto}
.wp-ov.open{display:flex}
.wp-modal{background:var(--paper);border-radius:17px;max-width:480px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.25);margin:auto}
.wp-head{padding:20px 22px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.wp-head h2{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:600;margin:0;color:var(--ink)}
.wp-x{border:0;background:transparent;font-size:24px;line-height:1;cursor:pointer;color:var(--ink-soft);padding:0}
.wp-x:hover{color:var(--ink)}
.wp-body{padding:18px 22px 22px}
#wpProdName{font-weight:600;margin-bottom:12px;color:var(--ink-soft)}
.wp-item{display:block;width:100%;text-align:left;padding:13px 16px;border:1px solid var(--line);border-radius:11px;background:#fff;font-size:14.5px;font-weight:600;color:var(--ink);cursor:pointer;margin-bottom:8px;font-family:inherit}
.wp-item .sub{display:block;font-weight:500;font-size:12.5px;color:var(--ink-soft);margin-top:2px}
.wp-hint{font-size:13px;color:var(--ink-soft);text-align:center}
.wp-back{display:inline-block;margin-bottom:10px;border:0;background:transparent;color:var(--ink-soft);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:underline;padding:0}
.wp-back:hover{color:var(--ink)}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:120}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style></head><body><div class="wrap">

function handleDeepLink(){var h=location.hash;if(h&&h.indexOf("#p=")===0){var id=decodeURIComponent(h.slice(3));var found=null;for(var i=0;i<P.length;i++){if(P[i].id===id){found=P[i];break;}}if(found)openProd(id);}}
function openProd(id){var p=null;for(var i=0;i<P.length;i++){if(P[i].id===id){p=P[i];break;}}if(!p)return;pvId=id;gi=0;renderProd();cscroll=window.scrollY||window.pageYOffset||0;document.getElementById("pv").classList.add("open");window.scrollTo(0,0);}
function renderProd(){var p=null;for(var i=0;i<P.length;i++){if(P[i].id===pvId){p=P[i];break;}}if(!p)return;var ph=photos(p);
var m=document.getElementById("pvMain");if(ph.length){m.innerHTML='<img src="'+ph[gi]+'">'+(p.liq?'<span class="pv-liq" style="'+(p.liqStyle||'')+'">'+lqx(p.liq)+'</span>':"");}else{m.innerHTML='<div class="ph"><span>'+(p.name[0]||"\u00b7")+'</span></div>'+(p.liq?'<span class="pv-liq" style="'+(p.liqStyle||'')+'">'+lqx(p.liq)+'</span>':"");}
var mImg=m.querySelector("img");if(mImg)mImg.onclick=function(){openZoom(mImg.src);};
var t=document.getElementById("pvThumbs");t.innerHTML="";if(ph.length>1){ph.forEach(function(src,i){var d=document.createElement("div");d.className="pv-thumb"+(i===gi?" on":"");d.innerHTML='<img src="'+src+'">';d.onclick=function(){gi=i;renderProd();};t.appendChild(d);});}
document.getElementById("pvTitle").textContent=p.name;
var mt2=document.getElementById("pvMeta");mt2.innerHTML=(p.size?'<span class="pv-tag sz">'+esc(p.size)+"</span>":"")+'<span class="pv-tag">'+esc(p.type)+"</span>"+(p.surface?'<span class="pv-tag">'+esc(p.surface)+"</span>":"")+(p.use?'<span class="pv-tag">'+esc(p.use)+"</span>":"")+(p.tags?Object.keys(p.tags).map(function(k){return p.tags[k]?'<span class="pv-tag">'+esc(p.tags[k])+"</span>":"";}).join(""):"");
document.getElementById("pvPrice").innerHTML=p.price?('<span class="plabel">Precio:</span> '+esc(p.price)):"";
var aw=document.getElementById("pvAreasWrap"),aEl=document.getElementById("pvAreas");var ar=p.areas||[];if(ar.length){aw.style.display="block";aEl.innerHTML="";ar.forEach(function(a){var d=document.createElement("div");d.className="area";d.innerHTML='<span class="dot"></span>'+esc(a);aEl.appendChild(d);});}else{aw.style.display="none";}}
document.getElementById("pvBack").onclick=function(){document.getElementById("pv").classList.remove("open");window.requestAnimationFrame(function(){window.scrollTo(0,cscroll);});};
document.getElementById("pvWaBtn").onclick=function(){var p=null;for(var i=0;i<P.length;i++){if(P[i].id===pvId){p=P[i];break;}}if(p)openWaPick(p);};
document.getElementById("pvCopyLink").onclick=function(){var p=null;for(var i=0;i<P.length;i++){if(P[i].id===pvId){p=P[i];break;}}if(p)copyProductLink(p);};
document.getElementById("svLogo").src=document.querySelector("header img").src;
function openStore(id){var s=null;for(var i=0;i<STORES.length;i++){if(STORES[i].id===id){s=STORES[i];break;}}if(!s)return;document.getElementById("svCity").textContent=s.name;document.getElementById("svBody").innerHTML=storeBody(s);document.getElementById("sv").classList.add("open");window.scrollTo(0,0);}function renderStores(){var c=document.getElementById("stores");if(!c)return;c.innerHTML="";STORES.forEach(function(s){var b=document.createElement("button");b.className="store";b.innerHTML=PIN+esc(s.name);b.onclick=function(){openStore(s.id);};c.appendChild(b);});}renderStores();
document.getElementById("svBack").onclick=function(){document.getElementById("sv").classList.remove("open");};
document.getElementById("q").addEventListener("input",function(e){st.q=e.target.value;render();});chips();renderSortCtl();render();
handleDeepLink();
</script></body></html>
